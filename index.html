<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahar G Call Service</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PeerJS for WebRTC Video Calling -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #121b22; color: #e9edef; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .app-container { width: 100%; max-width: 450px; height: 100vh; background: #0b141a; display: flex; flex-direction: column; position: relative; }
        
        /* Header */
        .header { background: #202c33; padding: 15px; text-align: center; border-bottom: 1px solid #2f3b43; }
        .header h2 { color: #00a884; font-size: 20px; font-weight: 600; letter-spacing: 1px; }

        /* Connection Box */
        .conn-box { padding: 20px; background: #1f2c34; margin: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; }
        .id-display { font-size: 14px; background: #2a3942; padding: 10px; border-radius: 8px; text-align: center; border: 1px dashed #00a884; }
        .id-display strong { color: #00a884; cursor: pointer; }
        
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
        input::placeholder { color: #8696a0; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-call { background: #128c7e; color: white; width: 100%; }
        .btn-call:hover { background: #0b695e; }

        /* Status Label */
        .status { text-align: center; font-size: 13px; color: #8696a0; margin-top: 5px; }

        /* Full Screen Video Container */
        .video-wrapper { flex: 1; position: relative; background: #000; display: none; overflow: hidden; }
        
        /* Remote Video (Full Screen) */
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Local Video (Floating Window) */
        #local-video { width: 110px; height: 160px; object-fit: cover; position: absolute; top: 20px; right: 20px; border-radius: 10px; border: 2px solid #00a884; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; transform: scaleX(-1); }

        /* Call Controls overlay */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 10; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-mute { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); }
        .btn-end { background: #ea0038; }
        .btn-end:hover { background: #c2002e; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h2><i class="fa-solid fa-shield-halved"></i> Mahar G Call</h2>
        </div>

        <!-- Setup Screen -->
        <div id="setup-screen">
            <div class="conn-box">
                <div class="id-display">
                    Apni ID: <strong id="my-id" onclick="copyID()">Loading...</strong>
                    <div style="font-size: 10px; color: #8696a0; margin-top: 4px;">(Click to copy)</div>
                </div>
                
                <div class="input-group">
                    <input type="text" id="peer-id-input" placeholder="Dost ya Wife ki ID paste karein">
                </div>
                
                <button onclick="startCall()" class="btn btn-call">
                    <i class="fa-solid fa-video"></i> Video Call Karein
                </button>
                <div class="status" id="status-text">Ready to connect</div>
            </div>
        </div>

        <!-- Real-time Video Screen -->
        <div class="video-wrapper" id="video-screen">
            <video id="local-video" autoplay muted playsinline></video>
            <video id="remote-video" autoplay playsinline></video>
            
            <!-- Controls -->
            <div class="controls">
                <button onclick="toggleMute()" class="control-btn btn-mute" id="mute-btn">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button onclick="endCall()" class="control-btn btn-end">
                    <i class="fa-solid fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // PeerJS initialize (random ID generate hogi)
        const peer = new Peer();
        let myId = "";
        let localStream = null;
        let currentCall = null;
        let isMuted = false;

        // Elements
        const myIdDisplay = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id-input');
        const statusText = document.getElementById('status-text');
        const setupScreen = document.getElementById('setup-screen');
        const videoScreen = document.getElementById('video-screen');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const muteBtn = document.getElementById('mute-btn');

        // 1. Peer ID receive hona
        peer.on('open', (id) => {
            myId = id;
            myIdDisplay.innerText = id;
            statusText.innerText = "Apni ID share karein aur call ka wait karein.";
        });

        // ID copy karne k liye logic
        function copyID() {
            if(myId) {
                navigator.clipboard.writeText(myId);
                alert("ID Copy ho gayi hai! Ab WhatsApp par share karein.");
            }
        }

        // Camera aur Mic access function
        async function getMedia(successCallback) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                localVideo.srcObject = stream;
                successCallback(stream);
            } catch (err) {
                alert("Camera ya Mic permission nahi mili!");
                console.error(err);
            }
        }

        // 2. Call Start Karna (Dialer)
        function startCall() {
            const remoteId = peerIdInput.value.trim();
            if (!remoteId) {
                alert("Please samne wale ki ID enter karein.");
                return;
            }

            statusText.innerText = "Calling...";
            
            getMedia((stream) => {
                setupScreen.style.display = 'none';
                videoScreen.style.display = 'block';

                const call = peer.call(remoteId, stream);
                handleCallStream(call);
            });
        }

        // 3. Call Receive Karna (Receiver)
        peer.on('call', (incomingCall) => {
            if (confirm("Mahar G! Call aa rahi hai. Kya aap accept karna chahte hain?")) {
                getMedia((stream) => {
                    setupScreen.style.display = 'none';
                    videoScreen.style.display = 'block';

                    incomingCall.answer(stream); // Call accept aur apna stream send kiya
                    handleCallStream(incomingCall);
                });
            }
        });

        // Remote Stream handle karna
        function handleCallStream(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream;
            });

            call.on('close', () => {
                resetUI();
            });
        }

        // 4. Mic Mute/Unmute Logic
        function toggleMute() {
            if (localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks()[0].enabled = !isMuted;
                muteBtn.innerHTML = isMuted ? '<i class="fa-solid fa-microphone-slash"></i>' : '<i class="fa-solid fa-microphone"></i>';
                muteBtn.style.background = isMuted ? '#ea0038' : 'rgba(255, 255, 255, 0.2)';
            }
        }

        // 5. Call End Karna
        function endCall() {
            if (currentCall) currentCall.close();
            resetUI();
        }

        function resetUI() {
            setupScreen.style.display = 'block';
            videoScreen.style.display = 'none';
            statusText.innerText = "Call ended.";
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop()); // Camera off karna
            }
            if(remoteVideo.srcObject) remoteVideo.srcObject = null;
            if(localVideo.srcObject) localVideo.srcObject = null;
        }
    </script>
</body>
</html>
